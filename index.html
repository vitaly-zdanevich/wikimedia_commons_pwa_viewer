<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)">
	<meta name="theme-color" content="#000" media="(prefers-color-scheme: dark)">
	<meta name="description" content="Wikimedia Commons image viewer">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Commons">
	<link rel="icon" href="icon.svg" type="image/svg+xml">
	<link rel="manifest" href="manifest.webmanifest">
	<title>Commons Viewer</title>
</head>
<body>
	<header>
		<form id="search-form" role="search">
			<input id="search" type="search" placeholder="Search Commons" autocomplete="off">
		</form>
		<button id="geo" type="button" title="Nearby" aria-label="Show nearby images">📍</button>
		<button id="prefs" type="button" title="Preferences" aria-label="Preferences">⚙</button>
		<nav id="suggestions"></nav>
	</header>
	<main id="app"></main>
	<dialog id="prefs-dialog">
		<form method="dialog">
			<fieldset style="border: none; margin: 0; padding: 0;">
				<legend>Images per line</legend>
				<label><input type="radio" name="columns" value="1"> One</label>
				<label><input type="radio" name="columns" value="2"> Two</label>
			</fieldset>
			<label class="prefs-user">User name
				<input id="username" type="text" autocomplete="off" enterkeyhint="done">
			</label>
			<a id="user-link" href="#" hidden></a>
			<button>Close</button>
			<a class="prefs-repo" href="https://github.com/vitaly-zdanevich/wikimedia_commons_pwa_viewer" target="_blank" rel="noopener">Source code on GitHub</a>
		</form>
	</dialog>
	<script type="module" src="/src/main.ts"></script>
</body>
</html>
